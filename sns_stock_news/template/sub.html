<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, initial-scale=1.0" />
    <title>Instagram Main/Sub Card</title>

    <!-- Hahmlet -->
    <link
      href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@400;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #111;
        display: flex;
        flex-direction: column;
        gap: 40px;
        align-items: center;
        justify-content: flex-start;
        padding: 40px 0;
        font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }

      .card {
        width: 1080px;
        height: 1080px;
        position: relative;
        overflow: hidden;
        color: #fff;
        background-color: #000;
        background-image: url("your-image.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      /* 공통 텍스트 영역 */
      .content {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 3;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding-left: 88px;
        padding-right: 88px;
      }

      .title {
        font-family: "Hahmlet", serif;
        font-weight: 600;
        font-size: 90px;
        line-height: 1.12;
        letter-spacing: -1.5px;
        word-break: keep-all;
      }

      .subtitle {
        margin-top: 24px;
        font-size: 34px;
        font-weight: 500;
        line-height: 1.5;
        opacity: 0.95;
        max-width: 820px;
        word-break: keep-all;
      }

      /* -------------------- */
      /* 메인 카드 */
      /* -------------------- */
      .card-main .overlay {
        position: absolute;
        inset: 0;
        z-index: 2;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.92) 0%,
          rgba(0, 0, 0, 0.82) 18%,
          rgba(0, 0, 0, 0.58) 34%,
          rgba(0, 0, 0, 0.28) 48%,
          rgba(0, 0, 0, 0.08) 58%,
          rgba(0, 0, 0, 0) 68%
        );
      }

      .card-main .content {
        min-height: 500px;
        justify-content: flex-end;
        padding-bottom: 96px;
      }

      /* -------------------- */
      /* 서브 카드 */
      /* -------------------- */
      .card-sub .overlay {
        position: absolute;
        inset: 0;
        z-index: 2;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.96) 0%,
          rgba(0, 0, 0, 0.93) 40%,
          rgba(0, 0, 0, 0.88) 62%,
          rgba(0, 0, 0, 0.55) 74%,
          rgba(0, 0, 0, 0.18) 82%,
          rgba(0, 0, 0, 0) 86%
        );
      }

      .card-sub .content {
        min-height: 820px;
        justify-content: flex-end;
        padding-bottom: 110px;
      }

      .card-sub .title {
        font-size: 72px;
        line-height: 1.16;
      }

      .card-sub .subtitle {
        font-size: 32px;
        max-width: 860px;
      }
    </style>
  </head>
  <body>
    <section
      class="card card-sub"
      style="background-image: url(&quot;your-sub-image.jpg&quot;)"
    >
      <div class="overlay"></div>
      <div class="content">
        <h2 class="title">
          설명형<br />
          서브 카드
        </h2>
        <p class="subtitle">
          서브 카드는 이미지가 상단에 20~25% 정도만 보이도록 구성하고, 대부분의
          영역은 텍스트 전달에 사용합니다.
        </p>
      </div>
    </section>
  </body>
</html>
